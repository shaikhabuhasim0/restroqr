<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings — RestroQR Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
Auth.guard();

function render() {
  const s = DB.getOne('settings');
  const content = `
    <div class="section-header">
      <span class="section-title">Settings</span>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;">

      <!-- Restaurant Info -->
      <div class="card">
        <div class="settings-section">
          <div class="settings-section-title">🍴 Restaurant Information</div>
          <div style="display:flex;align-items:center;gap:16px;margin-bottom:16px;">
            <div class="logo-preview" id="logoPreview" onclick="document.getElementById('logoFile').click()">
              ${s.logo ? `<img src="${s.logo}" alt="logo">` : '🍴'}
            </div>
            <div>
              <div style="font-size:.82rem;font-weight:600;margin-bottom:4px;">Restaurant Logo</div>
              <div style="font-size:.75rem;color:var(--text-muted);">Click to upload logo image</div>
              <input type="file" id="logoFile" accept="image/*" style="display:none" onchange="handleLogoUpload(event)">
            </div>
          </div>
          <div class="form-group">
            <label class="form-label">Restaurant Name *</label>
            <input class="form-control" id="sName" value="${s.name||''}">
          </div>
          <div class="form-group">
            <label class="form-label">Address</label>
            <textarea class="form-control" id="sAddress" rows="2">${s.address||''}</textarea>
          </div>
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Phone</label>
              <input class="form-control" id="sPhone" value="${s.phone||''}">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">GST Number</label>
              <input class="form-control" id="sGst" value="${s.gst||''}">
            </div>
          </div>
          <div class="form-row" style="margin-top:14px;">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Opening Time</label>
              <input class="form-control" id="sOpen" type="time" value="${s.openTime||'10:00'}">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Closing Time</label>
              <input class="form-control" id="sClose" type="time" value="${s.closeTime||'23:00'}">
            </div>
          </div>
          <div style="margin-top:18px;">
            <button class="btn btn-primary" onclick="saveSettings()">💾 Save Settings</button>
          </div>
        </div>
      </div>

      <!-- Change Password -->
      <div>
        <div class="card" style="margin-bottom:20px;">
          <div class="settings-section">
            <div class="settings-section-title">🔐 Change Password</div>
            <div id="pwdMsg"></div>
            <div class="form-group">
              <label class="form-label">Current Password</label>
              <div class="input-group">
                <input class="form-control" type="password" id="pwdCurrent" placeholder="Enter current password">
                <button class="input-addon" onclick="togglePwd('pwdCurrent',this)">👁️</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">New Password</label>
              <div class="input-group">
                <input class="form-control" type="password" id="pwdNew" placeholder="Enter new password">
                <button class="input-addon" onclick="togglePwd('pwdNew',this)">👁️</button>
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Confirm New Password</label>
              <div class="input-group">
                <input class="form-control" type="password" id="pwdConfirm" placeholder="Re-enter new password">
                <button class="input-addon" onclick="togglePwd('pwdConfirm',this)">👁️</button>
              </div>
            </div>
            <button class="btn btn-accent" onclick="changePassword()">🔑 Update Password</button>
          </div>
        </div>

        <!-- Admin Info -->
        <div class="card">
          <div class="settings-section">
            <div class="settings-section-title">👤 Admin Account</div>
            <div style="font-size:.88rem;color:var(--text-muted);margin-bottom:8px;">Admin ID</div>
            <div style="font-weight:700;font-size:1rem;margin-bottom:16px;"><code>${DB.getOne('admin').id}</code></div>
            <div class="form-group">
              <label class="form-label">Change Admin ID</label>
              <input class="form-control" id="newAdminId" placeholder="New admin ID">
            </div>
            <button class="btn btn-outline btn-sm" onclick="changeAdminId()">Update Admin ID</button>
          </div>
        </div>

        <!-- Danger zone -->
        <div class="card" style="margin-top:20px;border:1.5px solid var(--danger);">
          <div class="settings-section" style="margin-bottom:0">
            <div class="settings-section-title" style="color:var(--danger);border-color:rgba(231,76,60,.2);">⚠️ Danger Zone</div>
            <p style="font-size:.85rem;color:var(--text-muted);margin-bottom:14px;">Reset all data and seed fresh dummy data. This cannot be undone.</p>
            <button class="btn btn-danger btn-sm" onclick="resetData()">🔄 Reset All Data</button>
          </div>
        </div>
      </div>
    </div>`;

  buildPage('settings','Settings',content);
}

function handleLogoUpload(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    window._logoData = ev.target.result;
    const prev = document.getElementById('logoPreview');
    prev.innerHTML = `<img src="${ev.target.result}" style="width:100%;height:100%;object-fit:contain;">`;
  };
  reader.readAsDataURL(file);
}

function saveSettings() {
  const s = {
    name:      document.getElementById('sName').value.trim(),
    address:   document.getElementById('sAddress').value.trim(),
    phone:     document.getElementById('sPhone').value.trim(),
    gst:       document.getElementById('sGst').value.trim(),
    openTime:  document.getElementById('sOpen').value,
    closeTime: document.getElementById('sClose').value,
    logo:      window._logoData || DB.getOne('settings').logo || '',
    currency:  '₹'
  };
  if (!s.name) { showToast('Restaurant name required','error'); return; }
  DB.set('settings',s);
  showToast('Settings saved!','success');
  render();
}

function changePassword() {
  const current = document.getElementById('pwdCurrent').value;
  const newPwd  = document.getElementById('pwdNew').value;
  const confirm = document.getElementById('pwdConfirm').value;
  const admin   = DB.getOne('admin');
  const msgEl   = document.getElementById('pwdMsg');

  if (admin.password !== current) {
    msgEl.innerHTML = '<div style="background:#ffebee;color:var(--danger);padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:14px;">⚠️ Current password is incorrect</div>';
    return;
  }
  if (!newPwd || newPwd.length < 6) {
    msgEl.innerHTML = '<div style="background:#ffebee;color:var(--danger);padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:14px;">⚠️ Password must be at least 6 characters</div>';
    return;
  }
  if (newPwd !== confirm) {
    msgEl.innerHTML = '<div style="background:#ffebee;color:var(--danger);padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:14px;">⚠️ Passwords do not match</div>';
    return;
  }
  admin.password = newPwd;
  DB.set('admin', admin);
  msgEl.innerHTML = '<div style="background:#e8f5e9;color:var(--success);padding:10px 14px;border-radius:8px;font-size:.85rem;font-weight:600;margin-bottom:14px;">✅ Password updated successfully!</div>';
  ['pwdCurrent','pwdNew','pwdConfirm'].forEach(id => document.getElementById(id).value='');
}

function changeAdminId() {
  const newId = document.getElementById('newAdminId').value.trim();
  if (!newId) { showToast('Enter a new admin ID','error'); return; }
  const admin = DB.getOne('admin');
  admin.id = newId;
  DB.set('admin', admin);
  showToast('Admin ID updated!','success');
  document.getElementById('newAdminId').value='';
  render();
}

function togglePwd(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁️'; }
}

function resetData() {
  confirmDialog('Reset ALL data? This will re-seed dummy data and cannot be undone.', () => {
    localStorage.removeItem('rq_initialized');
    DB.init();
    showToast('Data reset & re-seeded!','warn');
    render();
  });
}

render();
</script>
</body>
</html>
