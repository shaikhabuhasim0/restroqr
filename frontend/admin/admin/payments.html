<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payments — RestroQR Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
Auth.guard();

function render(filter='all', search='') {
  const txns = DB.get('transactions').sort((a,b)=>new Date(b.time)-new Date(a.time));
  const orders = DB.get('orders');
  const unpaid = orders.filter(o=>!o.paid && o.status!=='rejected');

  const totalRevenue = txns.reduce((s,t)=>s+t.amount,0);
  const cash = txns.filter(t=>t.method==='Cash').reduce((s,t)=>s+t.amount,0);
  const upi  = txns.filter(t=>t.method==='UPI').reduce((s,t)=>s+t.amount,0);
  const card = txns.filter(t=>t.method==='Card').reduce((s,t)=>s+t.amount,0);

  let filtered = txns;
  if (filter!=='all') filtered = filtered.filter(t=>t.method===filter);
  if (search) filtered = filtered.filter(t=>
    t.id.toLowerCase().includes(search)||
    t.orderId.toLowerCase().includes(search)||
    t.customer.toLowerCase().includes(search)
  );

  const content = `
    <div class="section-header">
      <span class="section-title">Payment Management</span>
    </div>

    <div class="stat-grid" style="margin-bottom:20px;">
      <div class="stat-card">
        <div class="stat-icon" style="background:#fdf8ed;">💰</div>
        <div class="stat-info"><div class="stat-label">Total Revenue</div><div class="stat-value" style="color:var(--gold);font-size:1.2rem">${fmtCurrency(totalRevenue)}</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#e8f5e9;">💵</div>
        <div class="stat-info"><div class="stat-label">Cash</div><div class="stat-value" style="color:var(--success);font-size:1.1rem">${fmtCurrency(cash)}</div><div class="stat-sub">${txns.filter(t=>t.method==='Cash').length} txns</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#e3f2fd;">📱</div>
        <div class="stat-info"><div class="stat-label">UPI</div><div class="stat-value" style="color:var(--info);font-size:1.1rem">${fmtCurrency(upi)}</div><div class="stat-sub">${txns.filter(t=>t.method==='UPI').length} txns</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#f3e5f5;">💳</div>
        <div class="stat-info"><div class="stat-label">Card</div><div class="stat-value" style="color:var(--ready);font-size:1.1rem">${fmtCurrency(card)}</div><div class="stat-sub">${txns.filter(t=>t.method==='Card').length} txns</div></div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
      <!-- Method breakdown -->
      <div class="card">
        <div class="card-header"><span class="card-title">💳 Payment Methods</span></div>
        ${totalRevenue>0?`
          <div class="pay-method-stat">
            <span class="pay-method-name" style="color:var(--success)">Cash</span>
            <div class="pay-method-bar"><div class="pay-method-fill" style="width:${Math.round(cash/totalRevenue*100)}%;background:var(--success);"></div></div>
            <span class="pay-method-val">${fmtCurrency(cash)}</span>
          </div>
          <div class="pay-method-stat">
            <span class="pay-method-name" style="color:var(--info)">UPI</span>
            <div class="pay-method-bar"><div class="pay-method-fill" style="width:${Math.round(upi/totalRevenue*100)}%;background:var(--info);"></div></div>
            <span class="pay-method-val">${fmtCurrency(upi)}</span>
          </div>
          <div class="pay-method-stat">
            <span class="pay-method-name" style="color:var(--ready)">Card</span>
            <div class="pay-method-bar"><div class="pay-method-fill" style="width:${Math.round(card/totalRevenue*100)}%;background:var(--ready);"></div></div>
            <span class="pay-method-val">${fmtCurrency(card)}</span>
          </div>`:'<div class="empty-state" style="padding:20px"><p>No transactions yet</p></div>'}
      </div>

      <!-- Unpaid orders -->
      <div class="card">
        <div class="card-header">
          <span class="card-title">⏳ Unpaid Orders (${unpaid.length})</span>
        </div>
        ${unpaid.length===0?'<div class="empty-state" style="padding:16px"><span class="empty-icon" style="font-size:1.8rem">✅</span><p>All orders are paid!</p></div>':
          `<div style="max-height:180px;overflow-y:auto;">
          ${unpaid.map(o=>`
            <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px dashed var(--border);">
              <div>
                <div style="font-weight:700;font-size:.88rem;">${o.id}</div>
                <div style="font-size:.75rem;color:var(--text-muted);">${o.customer} · ${o.table}</div>
              </div>
              <div style="display:flex;align-items:center;gap:8px;">
                <strong>${fmtCurrency(o.total)}</strong>
                <button class="btn btn-sm btn-success" onclick="collectPayment('${o.id}')">Collect</button>
              </div>
            </div>`).join('')}
          </div>`}
      </div>
    </div>

    <!-- Transaction History -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">📋 Transaction History</span>
        <span style="font-size:.82rem;color:var(--text-muted);">${txns.length} transactions</span>
      </div>
      <div class="filter-bar" style="margin-bottom:12px;">
        <input class="search-input" id="paySearch" placeholder="Search transactions…" value="${search}"
          oninput="render('${filter}', this.value)">
        <select class="filter-select" onchange="render(this.value, document.getElementById('paySearch').value)">
          <option value="all" ${filter==='all'?'selected':''}>All Methods</option>
          <option value="Cash" ${filter==='Cash'?'selected':''}>Cash</option>
          <option value="UPI" ${filter==='UPI'?'selected':''}>UPI</option>
          <option value="Card" ${filter==='Card'?'selected':''}>Card</option>
        </select>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Txn ID</th><th>Order ID</th><th>Customer</th><th>Table</th><th>Amount</th><th>Method</th><th>Date & Time</th></tr></thead>
          <tbody>
            ${filtered.length===0?`<tr><td colspan="7"><div class="empty-state"><span class="empty-icon">💳</span><p>No transactions</p></div></td></tr>`:
              filtered.map(t=>`<tr>
                <td><code style="font-size:.8rem;color:var(--primary);">${t.id}</code></td>
                <td>${t.orderId}</td>
                <td>${t.customer}</td>
                <td>${t.table}</td>
                <td><strong>${fmtCurrency(t.amount)}</strong></td>
                <td>
                  <span class="badge ${t.method==='Cash'?'badge-success':t.method==='UPI'?'badge-info':'badge-ready'}">${t.method}</span>
                </td>
                <td style="font-size:.78rem;color:var(--text-muted);">${fmtDate(t.time)}</td>
              </tr>`).join('')}
          </tbody>
        </table>
      </div>
    </div>`;

  buildPage('payments','Payments',content);
}

function collectPayment(orderId) {
  const orders = DB.get('orders');
  const idx = orders.findIndex(o=>o.id===orderId);
  if (idx===-1) return;
  orders[idx].paid = true;
  DB.set('orders', orders);
  const txns = DB.get('transactions');
  txns.push({
    id: 'TXN'+Date.now(),
    orderId,
    amount: orders[idx].total,
    method: orders[idx].payMethod,
    time: new Date().toISOString(),
    customer: orders[idx].customer,
    table: orders[idx].table
  });
  DB.set('transactions', txns);
  showToast('Payment collected!','success');
  render();
}

render();
</script>
</body>
</html>
