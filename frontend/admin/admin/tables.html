<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tables & QR — RestroQR Admin</title>
  <link rel="stylesheet" href="css/style.css">
  <!-- QRCode.js library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>
<script src="js/data.js"></script>
<script src="js/app.js"></script>
<script>
Auth.guard();
let editTableId = null;

function render() {
  const tables = DB.get('tables');
  const settings = DB.getOne('settings');
  const baseUrl = window.location.origin + '/menu/';

  const content = `
    <div class="section-header">
      <span class="section-title">Tables & QR Management</span>
      <button class="btn btn-primary" onclick="openAdd()">+ Add Table</button>
    </div>

    <!-- Summary -->
    <div class="stat-grid" style="margin-bottom:20px;">
      <div class="stat-card">
        <div class="stat-icon" style="background:#e8f5e9;">🪑</div>
        <div class="stat-info"><div class="stat-label">Total Tables</div><div class="stat-value" style="color:var(--success)">${tables.length}</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#e3f2fd;">✅</div>
        <div class="stat-info"><div class="stat-label">Available</div><div class="stat-value" style="color:var(--info)">${tables.filter(t=>t.status==='available').length}</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#ffebee;">🔴</div>
        <div class="stat-info"><div class="stat-label">Occupied</div><div class="stat-value" style="color:var(--danger)">${tables.filter(t=>t.status==='occupied').length}</div></div>
      </div>
      <div class="stat-card">
        <div class="stat-icon" style="background:#fff8e1;">🟡</div>
        <div class="stat-info"><div class="stat-label">Reserved</div><div class="stat-value" style="color:var(--warning)">${tables.filter(t=>t.status==='reserved').length}</div></div>
      </div>
    </div>

    <div class="qr-grid">
      ${tables.map(t => `
        <div class="table-card" id="tc-${t.id}">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
            <div>
              <div class="table-number">Table ${t.number}</div>
              <div class="table-cap">👥 ${t.capacity} seats</div>
            </div>
            <div>${statusBadge(t.status)}</div>
          </div>
          <div id="qr-${t.id}" style="width:140px;height:140px;margin:0 auto 12px;border:2px solid var(--border);border-radius:8px;padding:6px;background:#fff;display:flex;align-items:center;justify-content:center;"></div>
          <div style="font-size:.7rem;color:var(--text-muted);word-break:break-all;margin-bottom:10px;">${baseUrl}?table=${t.id}</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;">
            <button class="btn btn-sm btn-info" onclick="openEdit('${t.id}')">✏️</button>
            <button class="btn btn-sm btn-success" onclick="changeStatus('${t.id}','available')">✅</button>
            <button class="btn btn-sm btn-warning" onclick="changeStatus('${t.id}','reserved')">🟡</button>
            <button class="btn btn-sm btn-danger" onclick="changeStatus('${t.id}','occupied')">🔴</button>
            <button class="btn btn-sm btn-outline" onclick="downloadQR('${t.id}','${t.number}')">⬇️ QR</button>
            <button class="btn btn-sm btn-danger" onclick="deleteTable('${t.id}')">🗑️</button>
          </div>
        </div>`).join('')}
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="tableModal">
      <div class="modal">
        <div class="modal-header">
          <span class="modal-title" id="tableModalTitle">Add Table</span>
          <button class="modal-close" onclick="closeModal('tableModal')">✕</button>
        </div>
        <div class="modal-body">
          <div class="form-row">
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Table Number *</label>
              <input class="form-control" id="tNum" placeholder="e.g. 09">
            </div>
            <div class="form-group" style="margin-bottom:0">
              <label class="form-label">Capacity *</label>
              <input class="form-control" id="tCap" type="number" min="1" max="20" placeholder="e.g. 4">
            </div>
          </div>
          <div class="form-group" style="margin-top:14px">
            <label class="form-label">Status</label>
            <select class="form-control" id="tStatus">
              <option value="available">Available</option>
              <option value="occupied">Occupied</option>
              <option value="reserved">Reserved</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline" onclick="closeModal('tableModal')">Cancel</button>
          <button class="btn btn-primary" onclick="saveTable()">💾 Save</button>
        </div>
      </div>
    </div>`;

  buildPage('tables','Tables & QR',content);
  // Generate all QRs after DOM paint
  setTimeout(() => {
    const tables2 = DB.get('tables');
    const url = window.location.origin + '/menu/';
    tables2.forEach(t => {
      const el = document.getElementById('qr-' + t.id);
      if (el && typeof QRCode !== 'undefined') {
        el.innerHTML = '';
        new QRCode(el, {
          text: url + '?table=' + t.id,
          width: 126, height: 126,
          colorDark: '#1a1208',
          colorLight: '#ffffff',
          correctLevel: QRCode.CorrectLevel.M
        });
      }
    });
  }, 100);
}

function openAdd() {
  editTableId = null;
  document.getElementById('tableModalTitle').textContent = 'Add Table';
  ['tNum','tCap'].forEach(id => document.getElementById(id).value='');
  document.getElementById('tStatus').value='available';
  openModal('tableModal');
}
function openEdit(id) {
  const t = DB.get('tables').find(t=>t.id===id);
  if (!t) return;
  editTableId = id;
  document.getElementById('tableModalTitle').textContent = 'Edit Table';
  document.getElementById('tNum').value = t.number;
  document.getElementById('tCap').value = t.capacity;
  document.getElementById('tStatus').value = t.status;
  openModal('tableModal');
}
function saveTable() {
  const num = document.getElementById('tNum').value.trim();
  const cap = parseInt(document.getElementById('tCap').value);
  const status = document.getElementById('tStatus').value;
  if (!num || !cap) { showToast('Fill all fields','error'); return; }
  const tables = DB.get('tables');
  if (editTableId) {
    const idx = tables.findIndex(t=>t.id===editTableId);
    tables[idx] = {...tables[idx], number:num, capacity:cap, status};
    showToast('Table updated!','success');
  } else {
    tables.push({ id:'T'+uid(), number:num, capacity:cap, status });
    showToast('Table added!','success');
  }
  DB.set('tables',tables);
  closeModal('tableModal');
  render();
}
function changeStatus(id, status) {
  const tables = DB.get('tables');
  const idx = tables.findIndex(t=>t.id===id);
  tables[idx].status = status;
  DB.set('tables',tables);
  showToast('Status updated','info');
  render();
}
function deleteTable(id) {
  confirmDialog('Delete this table?', () => {
    DB.set('tables', DB.get('tables').filter(t=>t.id!==id));
    showToast('Deleted','warn');
    render();
  });
}
function downloadQR(id, num) {
  const qrEl = document.querySelector('#qr-'+id+' canvas');
  if (!qrEl) { showToast('QR not ready','error'); return; }
  const link = document.createElement('a');
  link.download = 'Table-'+num+'-QR.png';
  link.href = qrEl.toDataURL('image/png');
  link.click();
  showToast('QR downloaded!','success');
}
render();
</script>
</body>
</html>
