<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — RestroQR Admin</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<script src="js/app.js"></script>
<script>
  // Auth check
  if (!sessionStorage.getItem('rq_session') && !localStorage.getItem('rq_remember')) {
    window.location.href = '/admin';
  }

  // ===== HELPERS =====
  function fmtCurrency(val) {
    return '₹' + Number(val || 0).toFixed(2);
  }

  function fmtDate(str) {
    if (!str) return '';
    const d = new Date(str);
    return d.toLocaleString('en-IN', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
  }

  function statusBadge(status) {
    const map = {
      'Pending':   ['badge-warn',    '⏳ Pending'],
      'Preparing': ['badge-info',    '🔥 Preparing'],
      'Completed': ['badge-success', '✅ Completed'],
      'Rejected':  ['badge-danger',  '❌ Rejected'],
    };
    const [cls, label] = map[status] || ['badge-warn', status];
    return `<span class="badge ${cls}">${label}</span>`;
  }

  // ===== MAIN INIT =====
  async function init() {
    try {
      // Fetch orders and menu from Flask API
      const [ordersRes, menuRes] = await Promise.all([
        fetch('/getOrders'),
        fetch('/getMenu')
      ]);

      const ordersData = await ordersRes.json();
      const menuData   = await menuRes.json();

      const orders = ordersData.success ? ordersData.orders : [];
      const menuObj = menuData.success ? menuData.menu : {};

      // Flatten menu items
      const menuItems = Object.values(menuObj).flat();

      // Stats
      const total     = orders.length;
      const pending   = orders.filter(o => o.status === 'Pending').length;
      const preparing = orders.filter(o => o.status === 'Preparing').length;
      const completed = orders.filter(o => o.status === 'Completed').length;
      const rejected  = orders.filter(o => o.status === 'Rejected').length;
      const revenue   = orders
        .filter(o => o.status === 'Completed')
        .reduce((s, o) => s + (o.total || 0), 0);

      const recent = [...orders].slice(0, 8);

      // Revenue last 7 days
      const days = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date();
        d.setDate(d.getDate() - i);
        const dayStr = d.toLocaleDateString('en-IN', { weekday: 'short' });
        const dayRev = orders.filter(o => {
          const od = new Date(o.time);
          return od.toDateString() === d.toDateString() && o.status === 'Completed';
        }).reduce((s, o) => s + (o.total || 0), 0);
        days.push({ label: dayStr, value: dayRev });
      }
      const maxRev = Math.max(...days.map(d => d.value), 1);

      const content = `
        <!-- Stat Cards -->
        <div class="stat-grid">
          <div class="stat-card">
            <div class="stat-icon" style="background:#fdecea;">🧾</div>
            <div class="stat-info">
              <div class="stat-label">Total Orders</div>
              <div class="stat-value" style="color:var(--primary)">${total}</div>
              <div class="stat-sub">All time</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#fff8e1;">⏳</div>
            <div class="stat-info">
              <div class="stat-label">Pending</div>
              <div class="stat-value" style="color:var(--warning)">${pending}</div>
              <div class="stat-sub">Awaiting action</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#e3f2fd;">🔥</div>
            <div class="stat-info">
              <div class="stat-label">Preparing</div>
              <div class="stat-value" style="color:var(--info)">${preparing}</div>
              <div class="stat-sub">In kitchen</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#e8f5e9;">✅</div>
            <div class="stat-info">
              <div class="stat-label">Completed</div>
              <div class="stat-value" style="color:var(--success)">${completed}</div>
              <div class="stat-sub">Served</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#fdf8ed;">💰</div>
            <div class="stat-info">
              <div class="stat-label">Revenue</div>
              <div class="stat-value" style="color:var(--gold);font-size:1.2rem">${fmtCurrency(revenue)}</div>
              <div class="stat-sub">From completed orders</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#fce4ec;">🍽️</div>
            <div class="stat-info">
              <div class="stat-label">Menu Items</div>
              <div class="stat-value" style="color:var(--accent)">${menuItems.length}</div>
              <div class="stat-sub">${Object.keys(menuObj).length} categories</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon" style="background:#fdecea;">❌</div>
            <div class="stat-info">
              <div class="stat-label">Rejected</div>
              <div class="stat-value" style="color:var(--danger)">${rejected}</div>
              <div class="stat-sub">Cancelled orders</div>
            </div>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px;">
          <!-- Revenue Chart -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">📈 Revenue — Last 7 Days</span>
              <span style="font-size:.8rem;color:var(--text-muted);">Completed orders</span>
            </div>
            <div style="display:flex;align-items:flex-end;gap:8px;height:140px;padding:0 4px;">
              ${days.map(d => `
                <div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;">
                  <div style="font-size:.65rem;color:var(--text-muted);font-weight:700;">${d.value > 0 ? '₹' + Math.round(d.value) : ''}</div>
                  <div style="width:100%;background:linear-gradient(to top,var(--primary),var(--accent));border-radius:4px 4px 0 0;height:${Math.round((d.value/maxRev)*100)}px;min-height:${d.value>0?'4px':'0'};transition:height .3s;"></div>
                  <div style="font-size:.72rem;color:var(--text-muted);font-weight:600;">${d.label}</div>
                </div>`).join('')}
            </div>
          </div>

          <!-- Order Status -->
          <div class="card">
            <div class="card-header">
              <span class="card-title">🍩 Order Status</span>
            </div>
            ${[
              ['Pending',   pending,   'var(--warning)'],
              ['Preparing', preparing, 'var(--info)'],
              ['Completed', completed, 'var(--success)'],
              ['Rejected',  rejected,  'var(--danger)']
            ].map(([label, count, color]) => `
              <div style="margin-bottom:10px;">
                <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:4px;">
                  <span style="font-weight:600;">${label}</span>
                  <span style="font-weight:700;color:${color};">${count}</span>
                </div>
                <div class="progress-bar">
                  <div class="progress-fill" style="width:${total > 0 ? Math.round((count/total)*100) : 0}%;background:${color};"></div>
                </div>
              </div>`).join('')}
          </div>
        </div>

        <!-- Recent Orders -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">🕐 Recent Orders</span>
            <a href="/admin/orders" class="btn btn-outline btn-sm">View All</a>
          </div>
          <div class="table-wrap">
            <table>
              <thead><tr>
                <th>Order ID</th><th>Table</th><th>Items</th><th>Amount</th><th>Status</th><th>Time</th>
              </tr></thead>
              <tbody>
                ${recent.length > 0 ? recent.map(o => `
                  <tr>
                    <td><strong>#${o.id}</strong></td>
                    <td>Table ${o.table}</td>
                    <td>${o.items.length} item${o.items.length > 1 ? 's' : ''}</td>
                    <td><strong>${fmtCurrency(o.total)}</strong></td>
                    <td>${statusBadge(o.status)}</td>
                    <td style="color:var(--text-muted);font-size:.8rem;">${fmtDate(o.time)}</td>
                  </tr>`).join('') : '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);">No orders yet</td></tr>'}
              </tbody>
            </table>
          </div>
        </div>`;

      buildPage('dashboard', 'Dashboard', content);

    } catch (err) {
      console.error('Dashboard error:', err);
      document.body.innerHTML += `<div style="color:red;padding:20px;">Error loading dashboard: ${err.message}</div>`;
    }
  }

  init();
</script>
</body>
</html>
