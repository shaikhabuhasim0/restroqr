<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login — RestroQR</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,600;1,300&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold:      #d4a843;
      --gold-lt:   #f0c96a;
      --gold-dk:   #a07820;
      --ember:     #c0390b;
      --ember-lt:  #e05020;
      --cream:     #faf3e8;
      --cream-dim: #c9b99a;
      --dark:      #100a04;
      --card-bg:   rgba(18, 10, 4, 0.82);
      --muted:     #8a7055;
      --border:    rgba(212,168,67,0.22);
    }

    html, body {
      height: 100%;
      font-family: 'Outfit', sans-serif;
      background: var(--dark);
      overflow: hidden;
    }

    /* ── CANVAS BACKGROUND ─── */
    #bgCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 0;
    }

    /* ── PARTICLES ─── */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      overflow: hidden;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      animation: particleDrift linear infinite;
    }

    @keyframes particleDrift {
      0%   { transform: translateY(100vh) rotate(0deg); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-120px) rotate(720deg); opacity: 0; }
    }

    /* ── FLOATING EMBERS ─── */
    .embers {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }
    .ember-dot {
      position: absolute;
      width: 3px; height: 3px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 6px 2px rgba(212,168,67,0.8);
      animation: emberFloat ease-in-out infinite;
    }
    @keyframes emberFloat {
      0%   { transform: translate(0,0) scale(1); opacity: 0; }
      20%  { opacity: 1; }
      50%  { transform: translate(var(--dx), calc(var(--dy)*0.5)) scale(0.8); }
      80%  { opacity: 0.4; }
      100% { transform: translate(calc(var(--dx)*1.5), var(--dy)) scale(0.2); opacity: 0; }
    }

    /* ── SCAN LINE ─── */
    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 3px,
        rgba(0,0,0,0.03) 3px,
        rgba(0,0,0,0.03) 4px
      );
      animation: scanlineMove 8s linear infinite;
    }
    @keyframes scanlineMove {
      from { background-position: 0 0; }
      to   { background-position: 0 100px; }
    }

    /* ── VIGNETTE ─── */
    .vignette {
      position: fixed;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      background: radial-gradient(ellipse 80% 80% at 50% 50%, transparent 40%, rgba(0,0,0,0.75) 100%);
    }

    /* ── MAIN LAYOUT ─── */
    .page {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* ── CARD ─── */
    .card-wrap {
      width: 100%;
      max-width: 440px;
      animation: cardReveal 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes cardReveal {
      from { opacity: 0; transform: translateY(40px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 48px 44px 40px;
      backdrop-filter: blur(28px) saturate(160%);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      box-shadow:
        0 0 0 1px rgba(212,168,67,0.06),
        0 40px 80px rgba(0,0,0,0.85),
        0 0 60px rgba(212,168,67,0.05),
        inset 0 1px 0 rgba(212,168,67,0.18),
        inset 0 -1px 0 rgba(0,0,0,0.5);
      position: relative;
      overflow: hidden;
    }

    /* Top gold shimmer bar */
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, transparent 0%, var(--gold-dk) 20%, var(--gold-lt) 50%, var(--gold-dk) 80%, transparent 100%);
      animation: shimmerBar 3s ease-in-out infinite;
    }
    @keyframes shimmerBar {
      0%,100% { opacity: 0.7; }
      50%      { opacity: 1; }
    }

    /* Corner accents */
    .card::after {
      content: '';
      position: absolute;
      top: 16px; right: 16px;
      width: 40px; height: 40px;
      border-top: 1px solid rgba(212,168,67,0.3);
      border-right: 1px solid rgba(212,168,67,0.3);
      border-radius: 0 6px 0 0;
      pointer-events: none;
    }
    .card-corner-bl {
      position: absolute;
      bottom: 16px; left: 16px;
      width: 40px; height: 40px;
      border-bottom: 1px solid rgba(212,168,67,0.3);
      border-left: 1px solid rgba(212,168,67,0.3);
      border-radius: 0 0 0 6px;
      pointer-events: none;
    }

    /* ── BRAND ─── */
    .brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .brand-logo {
      width: 72px; height: 72px;
      border-radius: 20px;
      background: linear-gradient(145deg, #d4a843 0%, #a07820 40%, #c0390b 100%);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: 18px;
      box-shadow:
        0 12px 32px rgba(212,168,67,0.4),
        0 4px 12px rgba(192,57,11,0.3),
        inset 0 1px 0 rgba(255,255,255,0.15);
      position: relative;
      animation: logoPulse 4s ease-in-out infinite;
    }
    @keyframes logoPulse {
      0%,100% { box-shadow: 0 12px 32px rgba(212,168,67,0.4), 0 4px 12px rgba(192,57,11,0.3), inset 0 1px 0 rgba(255,255,255,0.15); }
      50%      { box-shadow: 0 16px 48px rgba(212,168,67,0.6), 0 6px 20px rgba(192,57,11,0.45), inset 0 1px 0 rgba(255,255,255,0.15); }
    }

    .brand h1 {
      font-family: 'Cormorant Garamond', serif;
      font-size: 2.2rem;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: -0.01em;
      line-height: 1;
      margin-bottom: 6px;
    }
    .brand h1 .hl { color: var(--gold-lt); font-style: italic; }

    .brand-sub {
      font-size: 0.68rem;
      color: var(--muted);
      font-weight: 400;
      letter-spacing: 0.22em;
      text-transform: uppercase;
    }

    /* Ornament */
    .ornament {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 0 auto 30px;
      max-width: 220px;
    }
    .ornament-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(212,168,67,0.35));
    }
    .ornament-line.r { background: linear-gradient(90deg, rgba(212,168,67,0.35), transparent); }
    .ornament span {
      font-size: 0.55rem;
      color: var(--gold);
      letter-spacing: 0.25em;
      opacity: 0.8;
    }

    /* ── ERROR ─── */
    .login-error {
      display: none;
      background: rgba(192,57,11,0.15);
      border: 1px solid rgba(224,80,32,0.35);
      border-left: 3px solid var(--ember);
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 0.8rem;
      color: #f0a090;
      margin-bottom: 22px;
      animation: shakeErr 0.4s ease;
    }
    .login-error.show { display: block; }
    @keyframes shakeErr {
      0%,100% { transform: translateX(0); }
      20%      { transform: translateX(-7px); }
      40%      { transform: translateX(7px); }
      60%      { transform: translateX(-4px); }
      80%      { transform: translateX(4px); }
    }

    /* ── FORM ─── */
    .form-group { margin-bottom: 20px; }

    .form-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.68rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 9px;
    }
    .form-label .dot {
      width: 4px; height: 4px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.6;
    }

    .input-wrap { position: relative; }

    .form-input {
      width: 100%;
      background: rgba(255,243,220,0.05);
      border: 1px solid rgba(212,168,67,0.15);
      border-radius: 12px;
      padding: 13px 16px;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 300;
      color: var(--cream);
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      caret-color: var(--gold);
    }
    .form-input::placeholder { color: rgba(200,185,160,0.2); }
    .form-input:hover { border-color: rgba(212,168,67,0.28); }
    .form-input:focus {
      border-color: rgba(212,168,67,0.55);
      background: rgba(212,168,67,0.06);
      box-shadow: 0 0 0 4px rgba(212,168,67,0.08), 0 0 20px rgba(212,168,67,0.06);
    }
    .form-input.has-addon { padding-right: 50px; }

    .input-addon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 0.95rem;
      color: var(--muted);
      transition: color 0.2s, transform 0.2s;
      padding: 5px;
      line-height: 1;
    }
    .input-addon:hover { color: var(--gold); transform: translateY(-50%) scale(1.15); }

    /* ── META ROW ─── */
    .row-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.8rem;
      color: var(--muted);
      cursor: pointer;
      user-select: none;
    }
    .remember-label input[type=checkbox] {
      accent-color: var(--gold);
      width: 14px; height: 14px;
      cursor: pointer;
    }
    .change-pw {
      font-size: 0.76rem;
      color: var(--gold);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s, letter-spacing 0.2s;
      letter-spacing: 0.02em;
    }
    .change-pw:hover { opacity: 1; letter-spacing: 0.05em; }

    /* ── BUTTON ─── */
    .btn-signin {
      width: 100%;
      padding: 15px;
      border: none;
      border-radius: 13px;
      background: linear-gradient(135deg, var(--ember-lt) 0%, var(--ember) 50%, #8b1a00 100%);
      color: var(--cream);
      font-family: 'Outfit', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.25s;
      box-shadow:
        0 6px 24px rgba(192,57,11,0.5),
        0 2px 8px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.12);
    }

    .btn-signin::before {
      content: '';
      position: absolute;
      top: 0; left: -100%;
      width: 100%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      transition: left 0.5s ease;
    }
    .btn-signin:hover::before { left: 100%; }
    .btn-signin:hover {
      transform: translateY(-3px);
      box-shadow: 0 14px 36px rgba(192,57,11,0.65), 0 4px 12px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
    }
    .btn-signin:active { transform: translateY(-1px); }

    .btn-signin.loading { pointer-events: none; opacity: 0.7; }
    .btn-signin .btn-text { transition: opacity 0.2s; }
    .btn-signin.loading .btn-text { opacity: 0; }
    .btn-signin .spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }
    .btn-signin.loading .spinner { display: flex; }
    .spinner svg { animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── HINT ─── */
    .default-hint {
      margin-top: 20px;
      text-align: center;
      font-size: 0.72rem;
      color: rgba(138,112,85,0.55);
      padding: 10px 14px;
      border: 1px dashed rgba(212,168,67,0.1);
      border-radius: 9px;
      background: rgba(212,168,67,0.025);
      letter-spacing: 0.02em;
    }
    .default-hint strong { color: rgba(212,168,67,0.65); font-weight: 500; }

    /* ── STATUS DOTS (decorative) ─── */
    .status-bar {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-bottom: 28px;
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      opacity: 0.4;
      animation: statusPulse 2s ease-in-out infinite;
    }
    .status-dot:nth-child(1) { animation-delay: 0s; }
    .status-dot:nth-child(2) { animation-delay: 0.3s; }
    .status-dot:nth-child(3) { animation-delay: 0.6s; }
    @keyframes statusPulse {
      0%,100% { opacity: 0.25; transform: scale(0.8); }
      50%      { opacity: 0.8; transform: scale(1.2); }
    }
    .status-text {
      font-size: 0.62rem;
      color: rgba(138,112,85,0.5);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-left: 4px;
    }
  </style>
</head>
<body>

<!-- Live animated background canvas -->
<canvas id="bgCanvas"></canvas>

<!-- Floating ember particles -->
<div class="embers" id="embers"></div>

<div class="particles" id="particles"></div>
<div class="scanline"></div>
<div class="vignette"></div>

<div class="page">
  <div class="card-wrap">
    <div class="card">
      <div class="card-corner-bl"></div>

      <!-- Brand -->
      <div class="brand">
        <div class="brand-logo">🍴</div>
        <h1>Restro<span class="hl">QR</span> Admin</h1>
        <p class="brand-sub">Restaurant Management Portal</p>
      </div>

      <!-- Status indicator -->
      <div class="status-bar">
        <div class="status-dot"></div>
        <div class="status-dot"></div>
        <div class="status-dot"></div>
        <span class="status-text">Secure Connection</span>
      </div>

      <!-- Ornament -->
      <div class="ornament">
        <div class="ornament-line"></div>
        <span>✦ ✦ ✦</span>
        <div class="ornament-line r"></div>
      </div>

      <!-- Error -->
      <div class="login-error" id="loginError">⚠️ Invalid Admin ID or Password. Please try again.</div>

      <!-- Admin ID -->
      <div class="form-group">
        <label class="form-label" for="adminId">
          <span class="dot"></span> Admin ID
        </label>
        <div class="input-wrap">
          <input class="form-input" type="text" id="adminId" placeholder="Enter your admin ID" autocomplete="username">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group">
        <label class="form-label" for="adminPass">
          <span class="dot"></span> Password
        </label>
        <div class="input-wrap">
          <input class="form-input has-addon" type="password" id="adminPass" placeholder="Enter your password" autocomplete="current-password">
          <button class="input-addon" id="togglePwd" type="button" title="Toggle password visibility">👁️</button>
        </div>
      </div>

      <!-- Remember / Change PW -->
      <div class="row-meta">
        <label class="remember-label">
          <input type="checkbox" id="rememberMe">
          Remember me
        </label>
        <a href="/admin/settings" class="change-pw">Change Password →</a>
      </div>

      <!-- Sign In Button -->
      <button class="btn-signin" id="signinBtn" onclick="doLogin()">
        <span class="btn-text">🔐 &nbsp; Sign In</span>
        <span class="spinner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/>
          </svg>
        </span>
      </button>

      <!-- Default hint -->
      <div class="default-hint">
        Default — ID: <strong>admin</strong> &nbsp;·&nbsp; Password: <strong>admin123</strong>
      </div>

    </div>
  </div>
</div>

<script>
  /* ── SESSION CHECK ── */
  if (sessionStorage.getItem('rq_session') || localStorage.getItem('rq_remember')) {
    window.location.href = '/admin/dashboard';
  }

  /* ── ANIMATED CANVAS BACKGROUND ── */
  (function() {
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    let W, H, t = 0;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // Lava-lamp blobs
    const blobs = [
      { x: 0.15, y: 0.25, r: 0.38, vx: 0.00018, vy: 0.00011, color: [212,168,67,0.08] },
      { x: 0.80, y: 0.72, r: 0.44, vx: -0.00014, vy: -0.0001, color: [192,57,11,0.10] },
      { x: 0.50, y: 0.50, r: 0.55, vx: 0.00008, vy: 0.00015, color: [160,120,40,0.06] },
      { x: 0.85, y: 0.20, r: 0.30, vx: -0.0002, vy: 0.00012, color: [220,60,10,0.07] },
      { x: 0.20, y: 0.80, r: 0.35, vx: 0.00016, vy: -0.00013, color: [212,168,67,0.06] },
    ];

    function draw() {
      ctx.clearRect(0, 0, W, H);

      // Deep dark base
      ctx.fillStyle = '#0e0804';
      ctx.fillRect(0, 0, W, H);

      // Draw blobs
      blobs.forEach(b => {
        b.x += b.vx;
        b.y += b.vy;
        if (b.x < -0.2 || b.x > 1.2) b.vx *= -1;
        if (b.y < -0.2 || b.y > 1.2) b.vy *= -1;

        const [r,g,bb,a] = b.color;
        const px = b.x * W, py = b.y * H, pr = b.r * Math.max(W,H);
        const grad = ctx.createRadialGradient(px, py, 0, px, py, pr);
        grad.addColorStop(0, `rgba(${r},${g},${bb},${a})`);
        grad.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = grad;
        ctx.fillRect(0, 0, W, H);
      });

      // Subtle grid
      ctx.strokeStyle = 'rgba(212,168,67,0.02)';
      ctx.lineWidth = 1;
      const grid = 80;
      for (let x = 0; x < W; x += grid) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y < H; y += grid) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }

      t++;
      requestAnimationFrame(draw);
    }
    draw();
  })();

  /* ── EMBER PARTICLES ── */
  (function() {
    const container = document.getElementById('embers');
    for (let i = 0; i < 28; i++) {
      const dot = document.createElement('div');
      dot.className = 'ember-dot';
      const size = Math.random() * 3 + 2;
      dot.style.cssText = `
        left: ${Math.random() * 100}%;
        bottom: ${Math.random() * 30}%;
        width: ${size}px;
        height: ${size}px;
        --dx: ${(Math.random() - 0.5) * 80}px;
        --dy: ${-(Math.random() * 200 + 100)}px;
        animation-duration: ${Math.random() * 6 + 4}s;
        animation-delay: ${Math.random() * 8}s;
        opacity: 0;
        background: ${Math.random() > 0.5 ? '#d4a843' : '#e05020'};
        box-shadow: 0 0 ${size * 2}px ${size}px ${Math.random() > 0.5 ? 'rgba(212,168,67,0.7)' : 'rgba(224,80,32,0.7)'};
      `;
      container.appendChild(dot);
    }
  })();

  /* ── PASSWORD TOGGLE ── */
  document.getElementById('togglePwd').addEventListener('click', function () {
    const inp = document.getElementById('adminPass');
    if (inp.type === 'password') { inp.type = 'text'; this.textContent = '🙈'; }
    else                         { inp.type = 'password'; this.textContent = '👁️'; }
  });

  /* ── ENTER KEY ── */
  document.getElementById('adminId').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('adminPass').focus();
  });
  document.getElementById('adminPass').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  /* ── LOGIN ── */
  async function doLogin() {
    const id   = document.getElementById('adminId').value.trim();
    const pass = document.getElementById('adminPass').value;
    const rem  = document.getElementById('rememberMe').checked;
    const err  = document.getElementById('loginError');
    const btn  = document.getElementById('signinBtn');

    err.classList.remove('show');

    if (!id || !pass) {
      err.textContent = '⚠️ Please enter both Admin ID and Password.';
      err.classList.add('show');
      return;
    }

    btn.classList.add('loading');

    try {
      const res  = await fetch('/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username: id, password: pass })
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('rq_session', '1');
        if (rem) localStorage.setItem('rq_remember', '1');
        else localStorage.removeItem('rq_remember');
        window.location.href = '/admin/dashboard';
      } else {
        btn.classList.remove('loading');
        err.textContent = '⚠️ Invalid Admin ID or Password.';
        err.classList.add('show');
        document.getElementById('adminPass').value = '';
      }
    } catch (e) {
      btn.classList.remove('loading');
      err.textContent = '⚠️ Server error. Please try again.';
      err.classList.add('show');
    }
  }
</script>
</body>
</html>
